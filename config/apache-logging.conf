# ============================================================
# apache-logging.conf - Konfigurasi Logging Apache untuk DVWA
# Dipasang di: /etc/apache2/conf-enabled/logging.conf
# ============================================================

# Format log yang lebih detail (combined + waktu)
LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\" %D" combined_detailed

# Access log dengan format detail
CustomLog /var/log/apache2/access.log combined_detailed

# Error log
ErrorLog /var/log/apache2/error.log
LogLevel warn

# Log request body size (berguna untuk deteksi upload)
LogFormat "%h %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\" %I %O" combined_io
