# ============================================================
# apache-logging.conf - Konfigurasi Logging Apache untuk DVWA
# Dipasang di: /etc/apache2/conf-enabled/logging.conf
#
# UPDATED by TI Analyst:
# - Aktifkan mod_remoteip untuk menangkap IP asli dari Ngrok
# - NOTE: LoadModule dibutuhkan karena image DVWA (Debian Stretch)
#   tidak auto-load remoteip_module
# ============================================================

# Load modul RemoteIP (wajib sebelum pakai RemoteIPHeader)
LoadModule remoteip_module /usr/lib/apache2/modules/mod_remoteip.so

# Aktifkan RemoteIP untuk menangkap IP asli dari Ngrok proxy
RemoteIPHeader X-Forwarded-For
RemoteIPInternalProxy 172.31.250.1
RemoteIPInternalProxy 127.0.0.1

# Format log dengan IP asli (%a) dan X-Forwarded-For header
LogFormat "%a %l %u %t \"%r\" %>s %O \"%{Referer}i\" \"%{User-Agent}i\" \"%{X-Forwarded-For}i\" %D" combined_detailed
CustomLog /var/log/apache2/access.log combined_detailed

# Error log
ErrorLog /var/log/apache2/error.log
LogLevel warn
