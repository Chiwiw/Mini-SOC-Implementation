<!--
  ============================================================
  ossec.conf - Wazuh AGENT Configuration (Di dalam DVWA)
  SOC Project | Infrastructure Builder
  
  CARA INSTALL AGENT:
  1. Masuk ke container DVWA:
     docker exec -it dvwa-target bash
  2. Install Wazuh Agent (lihat INFRAS_README.md)
  3. Salin isi file ini ke: /var/ossec/etc/ossec.conf
  4. Restart agent: /var/ossec/bin/wazuh-control restart
  ============================================================
-->
<ossec_config>

  <!-- ======================================================
       KONEKSI KE WAZUH MANAGER
  ====================================================== -->
  <client>
    <server>
      <!-- IP Internal Wazuh Manager di docker network -->
      <address>172.31.250.11</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>ubuntu, ubuntu20</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <enrollment>
      <enabled>yes</enabled>
      <agent_name>dvwa-target</agent_name>
      <groups>web-servers</groups>
      <manager_address>172.31.250.11</manager_address>
      <port>1515</port>
    </enrollment>
  </client>

  <!-- ======================================================
       FILE INTEGRITY MONITORING (FIM)
       Deteksi: Upload file deface, perubahan web shell, dll.
  ====================================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- MONITOR UTAMA: Direktori web DVWA (realtime!) -->
    <directories realtime="yes"
                 check_all="yes"
                 report_changes="yes">
      /var/www/html
    </directories>

    <!-- Monitor config PHP sensitif -->
    <directories check_all="yes" report_changes="yes">
      /etc/php
    </directories>

    <!-- Ignore file yang sering berubah (mengurangi noise) -->
    <ignore>/var/www/html/dvwa/includes/dvwaPage.inc.php</ignore>
    <ignore type="sregex">.log$|.tmp$|.cache$</ignore>

    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <process_priority>10</process_priority>
    <max_eps>50</max_eps>
  </syscheck>

  <!-- ======================================================
       LOG MONITORING
  ====================================================== -->

  <!-- LOG 1: Apache Access Log (SQLi, XSS, LFI detection) -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <!-- LOG 2: Apache Error Log -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- LOG 3: Auth Log (Brute Force SSH/Login detection) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- LOG 4: Syslog umum -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- LOG 5: DVWA custom log (jika ada) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- ======================================================
       ROOTCHECK - Deteksi trojan/rootkit
  ====================================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
  </rootcheck>

  <!-- ======================================================
       SYSTEM INVENTORY (SCA)
  ====================================================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ======================================================
       ACTIVE RESPONSE (Penerimaan perintah dari Manager)
  ====================================================== -->
  <active-response>
    <disabled>no</disabled>
  </active-response>

</ossec_config>
