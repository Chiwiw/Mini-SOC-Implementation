    <alert_format>json</alert_format>
  </integration>
  -->

  <!-- ======================================================
       ACTIVE RESPONSE (Opsional: auto-block attacker IP)
  ====================================================== -->
  <!--
  <active-response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100001,100002,100003</rules_id>
    <timeout>600</timeout>
  </active-response>
  -->

  <!-- ======================================================
       RULESET
  ====================================================== -->
  <ruleset>
    <decoder_dir>ruleset/decoders</decoder_dir>
    <rule_dir>ruleset/rules</rule_dir>
    <rule_exclude>0215-policy_rules.xml</rule_exclude>
    <list>etc/lists/audit-keys</list>
    <list>etc/lists/amazon/aws-eventnames</list>
    <list>etc/lists/security-eventchannel</list>
    <!-- Custom decoders untuk DVWA logs -->
    <decoder_include>etc/decoders/local_decoder.xml</decoder_include>
    <!-- Custom rules kita -->
    <rule_include>etc/rules/local_rules.xml</rule_include>
  </ruleset>
</ossec_config>

